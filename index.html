<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vicky ❤️ Joel</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        text-align: center;
        color: white;
        overflow-x: hidden;
        background: black;
    }

    /* Fondo estrellas */
    .stars {
        position: fixed;
        width: 100%;
        height: 100%;
        background: transparent url("https://www.transparenttextures.com/patterns/stardust.png") repeat;
        animation: moveStars 100s linear infinite;
        z-index: -1;
    }

    @keyframes moveStars {
        from {background-position: 0 0;}
        to {background-position: 10000px 5000px;}
    }

    h1 {
        margin-top: 40px;
        font-size: 42px;
        padding: 0 10px;
    }

    #countdown {
        font-size: 26px;
        margin: 20px 10px;
        font-weight: bold;
    }

    input {
        padding: 10px;
        border-radius: 10px;
        border: none;
        margin: 5px;
        width: 250px;
        max-width: 90%;
    }

    .gallery {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        padding: 0 10px;
    }

    .gallery img {
        width: 220px;
        height: 220px;
        object-fit: cover;
        border-radius: 20px;
        margin: 10px;
        box-shadow: 0 10px 25px rgba(255,255,255,0.2);
        transition: 0.3s;
    }

    .gallery img:hover {
        transform: scale(1.05);
    }

    button {
        padding: 12px 20px;
        border-radius: 15px;
        border: none;
        margin: 10px;
        font-size: 15px;
        cursor: pointer;
        font-weight: bold;
        background: white;
        color: black;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.05);
    }

    /* 📱 Ajustes para celular */
    @media (max-width: 600px) {

        h1 {
            font-size: 28px;
        }

        #countdown {
            font-size: 18px;
        }

        .gallery img {
            width: 90%;
            height: auto;
        }

        button {
            width: 90%;
        }
    }

</style>
</head>

<body>

<div class="stars"></div>

<h1>Vicky ❤️ Joel</h1>

<h2>Falta para vernos:</h2>
<div id="countdown"></div>

<h3>Cambiar fecha</h3>
<input type="datetime-local" id="newDate">
<br>
<button onclick="updateDate()">Actualizar</button>

<h2>Nosotros</h2>
<div class="gallery">
    <img src="0edeb785-e44f-4346-a270-7de6c64dfdbe.jpg">
    <img src="62f12126-75f0-4a5c-9437-5882c8e83147.jpg">
    <img src="12afaaee-a01e-410a-bb96-2e598ed312bb.jpg">
    <img src="ce0e421f-b4bf-4ea1-b33d-ce85f6d3f748.jpg">
    <img src="71db6e68-01b7-457c-99df-05b95ce288e5.jpg">
    <img src="b2b07cfe-2e2a-4093-977c-abfee15641ee.jpg">
    <img src="728d42a6-6852-43e9-8bf9-63f619b3007c.jpg">
    <img src="5d2f2ffa-b1de-4b3a-863d-5d37493240c5.jpg">
    <img src="efc55d78-1cdc-4b96-9d79-b5e5c2eaf706.jpg">
</div>

<br>

<button onclick="playMusic()">🎵 Reproducir canción</button>

<audio id="music" src="worship-or-love.mp3" loop></audio>

<script>

let nextDate = localStorage.getItem("nextDate");

if (!nextDate) {
    nextDate = new Date("2026-03-23T13:30:00").getTime();
} else {
    nextDate = parseInt(nextDate);
}

function updateDate() {
    let selected = document.getElementById("newDate").value;
    if (selected) {
        nextDate = new Date(selected).getTime();
        localStorage.setItem("nextDate", nextDate);
    }
}

let countdown = setInterval(function() {
    let now = new Date().getTime();
    let distance = nextDate - now;

    let days = Math.floor(distance / (1000 * 60 * 60 * 24));
    let hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    let minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    let seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("countdown").innerHTML =
        days + " días " + hours + " horas " + minutes + " minutos " + seconds + " segundos";

    if (distance < 0) {
        document.getElementById("countdown").innerHTML = "Nos estamos viendo!!❤️";
    }
}, 1000);

function playMusic() {
    document.getElementById("music").play();
}

</script>

</body>
</html>
